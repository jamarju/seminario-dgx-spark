---
job: "extension"
config:
  name: "alicia_v4"
  process:
    - type: "diffusion_trainer"
      training_folder: "/home/javi/git/ai-toolkit/output"
      sqlite_db_path: "./aitk_db.db"
      device: "cuda"
      trigger_word: "al1c1a"
      performance_log_every: 10
      network:
        type: "lora"
        linear: 32
        linear_alpha: 32
        conv: 16
        conv_alpha: 16
        lokr_full_rank: true
        lokr_factor: -1
        network_kwargs:
          ignore_if_contains: []
      save:
        dtype: "bf16"
        save_every: 250
        max_step_saves_to_keep: 4
        save_format: "diffusers"
        push_to_hub: false
      datasets:
        - folder_path: "/home/javi/git/ai-toolkit/datasets/alicia"
          mask_path: null
          mask_min_value: 0.1
          default_caption: "a close-up portrait of al1c1a"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          cache_latents_to_disk: false
          is_reg: false
          network_weight: 1
          resolution:
            - 512
            - 768
            - 1024
          controls: []
          shrink_video_to_frames: true
          num_frames: 1
          do_i2v: true
          flip_x: false
          flip_y: false
      train:
        batch_size: 1
        bypass_guidance_embedding: false
        steps: 3000
        gradient_accumulation: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        timestep_type: "weighted"
        content_or_style: "balanced"
        optimizer_params:
          weight_decay: 0.0001
        unload_text_encoder: false
        cache_text_embeddings: false
        lr: 0.0001
        ema_config:
          use_ema: false
          ema_decay: 0.99
        skip_first_sample: false
        force_first_sample: false
        disable_sampling: false
        dtype: "bf16"
        diff_output_preservation: false
        diff_output_preservation_multiplier: 1
        diff_output_preservation_class: "person"
        switch_boundary_every: 1
        loss_type: "mse"
      logging:
        log_every: 1
        use_ui_logger: true
      model:
        name_or_path: "Tongyi-MAI/Z-Image-Turbo"
        quantize: false
        qtype: "qfloat8"
        quantize_te: true
        qtype_te: "qfloat8"
        arch: "zimage:turbo"
        low_vram: false
        model_kwargs: {}
        layer_offloading: false
        layer_offloading_text_encoder_percent: 1
        layer_offloading_transformer_percent: 1
        assistant_lora_path: "ostris/zimage_turbo_training_adapter/zimage_turbo_training_adapter_v2.safetensors"
      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 1024
        height: 1024
        samples:
          - prompt: "close-up portrait of al1c1a at the beach, golden hour lighting"
          - prompt: "a close-up portrait of al1c1a, neutral studio background, soft diffused light, 85mm lens, shallow depth of field"
          - prompt: "a close-up portrait of al1c1a, gray seamless backdrop, rim light, professional headshot"
          - prompt: "a close-up portrait of al1c1a, looking over shoulder, soft smile, golden hour"
          - prompt: "close-up portrait of al1c1a in a sunlit park, dappled light through trees, bokeh"
          - prompt: "a close-up portrait of al1c1a, neon city lights at night, colorful reflections, cinematic"
          - prompt: "close-up portrait of al1c1a, polaroid photo, slight blur, vintage tones"
          - prompt: "a close-up portrait of al1c1a, watercolor illustration, soft washes, paper texture"
          - prompt: "a close-up portrait of al1c1a, pencil sketch, fine linework, shading"
          - prompt: "a close-up portrait of al1c1a, cute cartoon style, clean outlines, pastel colors"
        neg: ""
        seed: 42
        walk_seed: true
        guidance_scale: 1
        sample_steps: 8
        num_frames: 1
        fps: 1
meta:
  name: "[name]"
  version: "1.0"
